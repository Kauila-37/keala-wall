<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 52" fill="none">

  <!-- ── The Agency Team Hawaii ─────────────────────────────── -->

  <!-- Maze icon: 7×7 grid, some cells filled, approx the TAT mark -->
  <g fill="#8a7355">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="5" height="5"/>
    <rect x="6"  y="0"  width="5" height="5"/>
    <rect x="12" y="0"  width="5" height="5"/>
    <rect x="18" y="0"  width="5" height="5"/>
    <rect x="24" y="0"  width="5" height="5"/>
    <rect x="30" y="0"  width="5" height="5"/>
    <rect x="36" y="0"  width="5" height="5"/>
    <!-- Row 2 -->
    <rect x="0"  y="6"  width="5" height="5"/>
    <rect x="18" y="6"  width="5" height="5"/>
    <rect x="36" y="6"  width="5" height="5"/>
    <!-- Row 3 -->
    <rect x="0"  y="12" width="5" height="5"/>
    <rect x="6"  y="12" width="5" height="5"/>
    <rect x="12" y="12" width="5" height="5"/>
    <rect x="18" y="12" width="5" height="5"/>
    <rect x="24" y="12" width="5" height="5"/>
    <rect x="36" y="12" width="5" height="5"/>
    <!-- Row 4 -->
    <rect x="0"  y="18" width="5" height="5"/>
    <rect x="24" y="18" width="5" height="5"/>
    <rect x="36" y="18" width="5" height="5"/>
    <!-- Row 5 -->
    <rect x="0"  y="24" width="5" height="5"/>
    <rect x="6"  y="24" width="5" height="5"/>
    <rect x="12" y="24" width="5" height="5"/>
    <rect x="18" y="24" width="5" height="5"/>
    <rect x="24" y="24" width="5" height="5"/>
    <rect x="30" y="24" width="5" height="5"/>
    <rect x="36" y="24" width="5" height="5"/>
    <!-- Row 6 -->
    <rect x="0"  y="30" width="5" height="5"/>
    <rect x="12" y="30" width="5" height="5"/>
    <rect x="24" y="30" width="5" height="5"/>
    <rect x="36" y="30" width="5" height="5"/>
    <!-- Row 7 -->
    <rect x="0"  y="36" width="5" height="5"/>
    <rect x="6"  y="36" width="5" height="5"/>
    <rect x="12" y="36" width="5" height="5"/>
    <rect x="18" y="36" width="5" height="5"/>
    <rect x="24" y="36" width="5" height="5"/>
    <rect x="30" y="36" width="5" height="5"/>
    <rect x="36" y="36" width="5" height="5"/>
  </g>

  <!-- THE AGENCY -->
  <text x="48" y="22"
    font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="700" letter-spacing="2.5"
    fill="#8a7355" text-anchor="start">THE AGENCY</text>

  <!-- TEAM HAWAII -->
  <text x="48" y="38"
    font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
    font-size="9.5" font-weight="400" letter-spacing="3.5"
    fill="#8a7355" text-anchor="start">TEAM HAWAII</text>

  <!-- Divider -->
  <line x1="152" y1="6" x2="152" y2="46" stroke="#c8bfb0" stroke-width="0.75"/>

  <!-- ── eXp Realty ────────────────────────────────────────── -->

  <!-- BROKERED BY -->
  <text x="164" y="14"
    font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
    font-size="7" font-weight="400" letter-spacing="1.5"
    fill="#888" text-anchor="start">BROKERED BY</text>

  <!-- exp -->
  <text x="162" y="40"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="900" letter-spacing="-0.5"
    fill="#1a1a1a" text-anchor="start">exp</text>

  <!-- REALTY + TM -->
  <text x="164" y="49"
    font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif"
    font-size="7.5" font-weight="400" letter-spacing="3"
    fill="#555" text-anchor="start">REALTY</text>
  <text x="218" y="19"
    font-family="Arial, sans-serif"
    font-size="7" fill="#1a1a1a">™</text>

</svg>
