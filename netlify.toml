# Netlify config — static site, no build step.
# Publishes the repo root as-is. Kept in version control so the deploy
# setup is reproducible and travels with the repo.

[build]
  publish = "."

# Keep non-production deploys (staging branch + PR deploy previews) out of
# search engines so they never compete with the live domain as duplicate
# content. Production (main) gets no _headers file, so it stays crawlable.
[context.branch-deploy]
  command = "printf '/*\\n  X-Robots-Tag: noindex\\n' > _headers"

[context.deploy-preview]
  command = "printf '/*\\n  X-Robots-Tag: noindex\\n' > _headers"

# The two prose "guides" were duplicates of the free land/relocation pages and
# were removed 2026-07-23; send any bookmarked links to the real pages.
[[redirects]]
  from = "/guide-land-buying.html"
  to = "/land.html"
  status = 301

[[redirects]]
  from = "/guide-relocation.html"
  to = "/relocation.html"
  status = 301
