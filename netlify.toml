# Netlify config — static site, no build step.
# Publishes the repo root as-is. Kept in version control so the deploy
# setup is reproducible and travels with the repo.

[build]
  publish = "."

# Keep non-production deploys (staging branch + PR deploy previews) out of
# search engines so they never compete with the live domain as duplicate
# content. Production (main) gets no _headers file, so it stays crawlable.
[context.branch-deploy]
  command = "printf '/*\\n  X-Robots-Tag: noindex\\n' > _headers"

[context.deploy-preview]
  command = "printf '/*\\n  X-Robots-Tag: noindex\\n' > _headers"

# Redirects for the old flat pages folded into the new Life/Land/Legacy structure,
# so existing inbound links and search rankings carry over instead of 404-ing.
# (index.html and land.html keep their URLs — no redirect needed.)
[[redirects]]
  from = "/ranches.html"
  to = "/land.html"
  status = 301

[[redirects]]
  from = "/off-grid.html"
  to = "/land.html"
  status = 301

[[redirects]]
  from = "/relocation.html"
  to = "/life.html"
  status = 301

[[redirects]]
  from = "/areas.html"
  to = "/life.html"
  status = 301
